naftiko: 1.0.0-alpha2
info:
  label: Vendr OpenPrice API — Webhooks
  description: 'Vendr OpenPrice API — Webhooks. 3 operations. Lead operation: Create Webhook. Self-contained Naftiko capability
    covering one Vendr business surface.'
  tags:
  - Vendr
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VENDR_API_KEY: VENDR_API_KEY
capability:
  consumes:
  - type: http
    namespace: vendr-webhooks
    baseUri: https://api.vendr.com
    description: Vendr OpenPrice API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: v1-webhooks
      path: /v1/webhooks
      operations:
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-webhooks-webhookId
      path: /v1/webhooks/{webhookId}
      operations:
      - name: deletewebhook
        method: DELETE
        description: Delete Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          description: Unique identifier for the webhook subscription
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.VENDR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: vendr-webhooks-rest
    port: 8080
    description: REST adapter for Vendr OpenPrice API — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/webhooks
      name: v1-webhooks
      description: REST surface for v1-webhooks.
      operations:
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: vendr-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: vendr-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/webhooks/{webhookid}
      name: v1-webhooks-webhookid
      description: REST surface for v1-webhooks-webhookId.
      operations:
      - method: DELETE
        name: deletewebhook
        description: Delete Webhook
        call: vendr-webhooks.deletewebhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vendr-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vendr OpenPrice API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vendr-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vendr-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vendr-webhooks.deletewebhook
      with:
        webhookId: tools.webhookId
      outputParameters:
      - type: object
        mapping: $.
