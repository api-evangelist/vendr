naftiko: "1.0.0-alpha1"

info:
  label: "Vendr OpenPrice API"
  description: >-
    The Vendr OpenPrice API provides SaaS pricing intelligence from 200,000+
    verified contracts across 20,000+ products. Access catalog data, fair price
    estimates, purchase scope management, and webhook event subscriptions.
  tags:
    - Vendr
    - Pricing
    - Procurement
    - SaaS
    - Software Spend
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VENDR_API_KEY: VENDR_API_KEY

capability:
  consumes:
    - type: http
      namespace: vendr
      baseUri: https://api.vendr.com
      description: "Vendr SaaS pricing intelligence and procurement API"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{VENDR_API_KEY}}"
        placement: header
      resources:
        - name: catalog
          path: /v1/catalog
          description: "Software product catalog with pricing profiles and add-ons"
          operations:
            - name: search-catalog
              method: GET
              description: "Search for companies and products in the Vendr catalog"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query for company or product name"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: scope
          path: /v1/scope
          description: "Define and parse purchase scope requirements"
          operations:
            - name: submit-scope
              method: POST
              description: "Submit purchase requirements as text and receive structured scope data"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  text: "{{tools.text}}"
                  productId: "{{tools.productId}}"

        - name: pricing
          path: /v1/pricing
          description: "Fair price estimates and negotiation insights"
          operations:
            - name: get-pricing-estimate
              method: POST
              description: "Get fair price estimate and negotiation insights for a software purchase"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  text: "{{tools.text}}"
                  productId: "{{tools.productId}}"

        - name: webhooks
          path: /v1/webhooks
          description: "Webhook event subscriptions"
          operations:
            - name: list-webhooks
              method: GET
              description: "List all registered webhook subscriptions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Create a new webhook subscription for event notifications"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
                  events: "{{tools.events}}"
                  secret: "{{tools.secret}}"

        - name: webhook-by-id
          path: /v1/webhooks/{webhookId}
          description: "Manage individual webhook subscriptions"
          operations:
            - name: delete-webhook
              method: DELETE
              description: "Remove a webhook subscription by ID"
              inputParameters:
                - name: webhookId
                  in: path
                  type: string
                  required: true
                  description: "Unique webhook subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vendr-rest
      resources:
        - path: /v1/catalog
          name: catalog
          description: "Software product catalog"
          operations:
            - method: GET
              name: search-catalog
              description: "Search the Vendr software catalog"

        - path: /v1/scope
          name: scope
          description: "Purchase scope management"
          operations:
            - method: POST
              name: submit-scope
              description: "Submit and parse purchase scope requirements"

        - path: /v1/pricing
          name: pricing
          description: "Pricing estimates"
          operations:
            - method: POST
              name: get-pricing-estimate
              description: "Get fair price estimate with negotiation insights"

        - path: /v1/webhooks
          name: webhooks
          description: "Webhook subscriptions"
          operations:
            - method: GET
              name: list-webhooks
              description: "List webhook subscriptions"
            - method: POST
              name: create-webhook
              description: "Create a webhook subscription"

        - path: /v1/webhooks/{webhookId}
          name: webhook-by-id
          description: "Individual webhook management"
          operations:
            - method: DELETE
              name: delete-webhook
              description: "Delete a webhook subscription"

    - type: mcp
      port: 9100
      namespace: vendr-mcp
      transport: http
      tools:
        - name: search-catalog
          description: "Search for companies and products in the Vendr software catalog"
          hints:
            readOnly: true
            idempotent: true
          call: "vendr.search-catalog"
          with:
            q: "tools.q"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."

        - name: submit-scope
          description: "Submit purchase requirements as text and receive structured scope data"
          hints:
            readOnly: true
            idempotent: true
          call: "vendr.submit-scope"
          with:
            text: "tools.text"
            productId: "tools.productId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-pricing-estimate
          description: "Get fair price estimate and negotiation insights for a software purchase"
          hints:
            readOnly: true
            idempotent: true
          call: "vendr.get-pricing-estimate"
          with:
            text: "tools.text"
            productId: "tools.productId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-webhooks
          description: "List all registered webhook subscriptions"
          hints:
            readOnly: true
            idempotent: true
          call: "vendr.list-webhooks"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-webhook
          description: "Create a webhook subscription for event notifications"
          hints:
            readOnly: false
            idempotent: false
          call: "vendr.create-webhook"
          with:
            url: "tools.url"
            events: "tools.events"
            secret: "tools.secret"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-webhook
          description: "Remove a webhook subscription by ID"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "vendr.delete-webhook"
          with:
            webhookId: "tools.webhookId"
          outputParameters:
            - type: object
              mapping: "$."
